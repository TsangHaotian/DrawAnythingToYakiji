<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>画什么都变成鸭吉吉</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }
        .canvas-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; background: white; }
        .toolbar { position: fixed; top: 16px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px; z-index: 100; padding: 0 16px; pointer-events: none; }
        .toolbar button { pointer-events: auto; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); border: none; color: white; padding: 10px 20px; border-radius: 40px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-family: inherit; }
        .toolbar button:active { transform: scale(0.96); }
        #clearBtn { background: rgba(231, 76, 60, 0.9); }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); color: #fff; padding: 8px 20px; border-radius: 40px; font-size: 13px; font-weight: 500; z-index: 100; white-space: nowrap; pointer-events: none; }
        @media (max-width: 600px) {
            .toolbar button { padding: 8px 14px; font-size: 12px; }
            .status { font-size: 11px; bottom: 12px; }
        }
    </style>
</head>
<body>
<div class="canvas-container"><canvas id="canvas"></canvas></div>
<div class="toolbar"><button id="clearBtn">🗑️ 清空</button></div>
<div class="status" id="status">🖼️ 加载图片中...</div>

<script>
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
    window.addEventListener('resize', resize);
    resize();

    // ===== 状态 =====
    let drawing = false, currentStroke = [];
    const BRUSH_COLOR = '#000000';
    const BRUSH_SIZE = 3;
    let placedImages = [];              // 已完成图片
    let activeTransforms = [];          // 并行粒子动画 [{ particles, startTime, target }]
    const DURATION = 1200;              // 单次动画时长
    const PAUSE_MS = 1000;              // 停笔等待时间（1秒）
    let pendingStrokes = [];            // 已画完等待变身的笔画
    let pauseTimer = null;              // 停笔计时器

    const statusDiv = document.getElementById('status');
    const clearBtn = document.getElementById('clearBtn');

    // ===== img/ 图片列表 =====
    const IMAGE_COUNT = 12;
    const IMAGE_FILES = Array.from({ length: IMAGE_COUNT }, (_, i) => `${i + 1}.png`);

    const imageDataList = [];           // [{ img, points: [{x,y,r,g,b}] }]
    let loaded = false, loadCount = 0;

    // 快速像素采样（缩小图片后逐像素，数毫秒完成）
    function samplePoints(img, maxPoints) {
        maxPoints = maxPoints || 800;
        const c = document.createElement('canvas');
        const cx = c.getContext('2d');
        const maxDim = 180;
        const s = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * s), h = Math.round(img.height * s);
        c.width = w; c.height = h;
        cx.drawImage(img, 0, 0, w, h);
        const data = cx.getImageData(0, 0, w, h).data;
        const pts = [];
        const step = 2;
        for (let y = 0; y < h; y += step) {
            for (let x = 0; x < w; x += step) {
                const i = (y * w + x) * 4;
                if (data[i+3] > 50 && (data[i] + data[i+1] + data[i+2]) > 30) {
                    pts.push({ x, y, r: data[i], g: data[i+1], b: data[i+2] });
                }
            }
        }
        if (pts.length > maxPoints) {
            for (let i = pts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pts[i], pts[j]] = [pts[j], pts[i]];
            }
            return pts.slice(0, maxPoints);
        }
        return pts;
    }

    IMAGE_FILES.forEach(file => {
        const img = new Image();
        img.onload = () => {
            const points = samplePoints(img);
            imageDataList.push({ img, points });
            loadCount++;
            if (loadCount === IMAGE_FILES.length) { loaded = true; statusDiv.innerText = '✏️ 随便画，粒子变身 ✨'; }
        };
        img.onerror = () => {
            loadCount++;
            if (loadCount === IMAGE_FILES.length) {
                if (imageDataList.length > 0) { loaded = true; statusDiv.innerText = '✏️ 随便画，粒子变身 ✨'; }
                else statusDiv.innerText = '❌ 图片加载失败';
            }
        };
        img.src = 'img/' + file;
    });

    // ===== 绘图基础 =====
    function drawWhiteBg() { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, w, h); }

    function drawStroke(points) {
        if (!points.length) return;
        ctx.save();
        ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = BRUSH_SIZE;
        ctx.strokeStyle = BRUSH_COLOR;
        if (points.length === 1) { ctx.beginPath(); ctx.arc(points[0].x, points[0].y, BRUSH_SIZE/2, 0, Math.PI*2); ctx.fill(); }
        else { ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y); ctx.stroke(); }
        ctx.restore();
    }

    function getBounds(points) {
        if (!points.length) return { centerX: w/2, centerY: h/2, width: 100, height: 100 };
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const p of points) { if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y; if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y; }
        return { centerX: (minX + maxX) / 2, centerY: (minY + maxY) / 2, width: maxX - minX + 20, height: maxY - minY + 20 };
    }

    function drawPlacedImage(item) {
        const dw = item.img.width * item.scale, dh = item.img.height * item.scale;
        ctx.drawImage(item.img, item.centerX - dw / 2, item.centerY - dh / 2, dw, dh);
    }

    // ===== 粒子（按图片轮廓重组） =====
    function createParticles(strokePoints, targetPoints, bounds, scale) {
        const arr = [];
        if (!strokePoints.length || !targetPoints.length) return arr;

        const cx = bounds.centerX, cy = bounds.centerY;
        let tMinX = Infinity, tMaxX = -Infinity, tMinY = Infinity, tMaxY = -Infinity;
        for (const pt of targetPoints) {
            if (pt.x < tMinX) tMinX = pt.x; if (pt.x > tMaxX) tMaxX = pt.x;
            if (pt.y < tMinY) tMinY = pt.y; if (pt.y > tMaxY) tMaxY = pt.y;
        }
        const tCx = (tMinX + tMaxX) / 2, tCy = (tMinY + tMaxY) / 2;

        for (const p of strokePoints) {
            const n = Math.floor(Math.random() * 5) + 3;
            for (let i = 0; i < n; i++) {
                const t = targetPoints[Math.floor(Math.random() * targetPoints.length)];
                arr.push({
                    x: p.x, y: p.y, startX: p.x, startY: p.y,
                    targetX: cx + (t.x - tCx) * scale,
                    targetY: cy + (t.y - tCy) * scale,
                    color: `rgb(${t.r},${t.g},${t.b})`,
                    size: Math.random() * 3 + 1.5,
                    life: 1.0
                });
            }
        }
        if (arr.length < 150) {
            for (let i = 0; i < 200 - arr.length; i++) {
                const sp = strokePoints[Math.floor(Math.random() * strokePoints.length)];
                const t = targetPoints[Math.floor(Math.random() * targetPoints.length)];
                arr.push({
                    x: sp.x, y: sp.y, startX: sp.x, startY: sp.y,
                    targetX: cx + (t.x - tCx) * scale,
                    targetY: cy + (t.y - tCy) * scale,
                    color: `rgb(${t.r},${t.g},${t.b})`,
                    size: Math.random() * 3 + 1.5,
                    life: 1.0
                });
            }
        }
        return arr;
    }

    // ===== 启动粒子变换 =====
    function startTransform(strokePoints) {
        if (!strokePoints.length || !loaded || !imageDataList.length) return;
        const data = imageDataList[Math.floor(Math.random() * imageDataList.length)];
        const bounds = getBounds(strokePoints);
        const strokeSpan = Math.max(bounds.width, bounds.height);

        // 粒子用采样坐标空间算缩放
        let tMinX = Infinity, tMaxX = -Infinity, tMinY = Infinity, tMaxY = -Infinity;
        for (const pt of data.points) {
            if (pt.x < tMinX) tMinX = pt.x; if (pt.x > tMaxX) tMaxX = pt.x;
            if (pt.y < tMinY) tMinY = pt.y; if (pt.y > tMaxY) tMaxY = pt.y;
        }
        const targetSpan = Math.max(tMaxX - tMinX, tMaxY - tMinY) || 1;
        const particleScale = strokeSpan / targetSpan;

        // 图片用原始尺寸算缩放（让图片大小匹配笔画大小）
        const imgSpan = Math.max(data.img.width, data.img.height);
        const drawScale = Math.max(0.2, strokeSpan / imgSpan);

        const particles = createParticles(strokePoints, data.points, bounds, particleScale);
        if (!particles.length) return;

        activeTransforms.push({
            particles,
            startTime: performance.now(),
            target: { img: data.img, centerX: bounds.centerX, centerY: bounds.centerY, scale: drawScale }
        });

        statusDiv.innerText = `✨ ${activeTransforms.length} 个粒子重组中...`;
    }

    // ===== 渲染循环 =====
    function render() {
        ctx.clearRect(0, 0, w, h);
        drawWhiteBg();

        for (const item of placedImages) drawPlacedImage(item);

        let completed = [];
        for (let idx = 0; idx < activeTransforms.length; idx++) {
            const t = activeTransforms[idx];
            const now = performance.now();
            let p = Math.min(1, (now - t.startTime) / DURATION);
            const ease = 1 - Math.pow(1 - p, 2.2);

            for (const pt of t.particles) {
                pt.x = pt.startX + (pt.targetX - pt.startX) * ease;
                pt.y = pt.startY + (pt.targetY - pt.startY) * ease;
                if (p < 0.5) pt.life = 1 - p * 1.5;
                else pt.life = Math.max(0, (1 - p) / 0.5);
                pt.life = Math.min(1, Math.max(0, pt.life));
                ctx.globalAlpha = pt.life * 0.9;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, pt.size * (1 - p * 0.2), 0, Math.PI * 2);
                ctx.fillStyle = pt.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            if (p > 0.5 && t.target) {
                ctx.globalAlpha = (p - 0.5) / 0.5;
                drawPlacedImage(t.target);
                ctx.globalAlpha = 1;
            }

            if (p >= 0.98) {
                completed.push(idx);
                if (t.target) placedImages.push(t.target);
            }
        }

        if (completed.length > 0) {
            activeTransforms = activeTransforms.filter((_, i) => !completed.includes(i));
            if (activeTransforms.length > 0) {
                statusDiv.innerText = `✨ ${activeTransforms.length} 个粒子重组中...`;
            } else {
                statusDiv.innerText = `✅ ${placedImages.length} 张 · 继续画 ✨`;
            }
        } else if (activeTransforms.length > 0) {
            let total = 0;
            for (const t of activeTransforms) total += Math.min(1, (performance.now() - t.startTime) / DURATION);
            statusDiv.innerText = `✨ ${activeTransforms.length} 个重组中... ${Math.floor((total / activeTransforms.length) * 100)}%`;
        }

        for (const stroke of pendingStrokes) drawStroke(stroke);
        if (currentStroke.length > 0) drawStroke(currentStroke);
        requestAnimationFrame(render);
    }

    // ===== 合并笔画统一变换 =====
    function flushPendingStrokes() {
        if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
        const strokes = pendingStrokes;
        pendingStrokes = [];
        if (!strokes.length) return;
        startTransform(strokes.flat());
    }

    // ===== 清空 =====
    clearBtn.addEventListener('click', () => {
        if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
        activeTransforms = []; placedImages = []; pendingStrokes = []; currentStroke = [];
        statusDiv.innerText = '🗑️ 已清空 ✨';
    });

    // ===== 输入 =====
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
        let cx, cy;
        if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        else { cx = e.clientX; cy = e.clientY; }
        return { x: Math.min(Math.max(0, (cx - rect.left) * sx), canvas.width), y: Math.min(Math.max(0, (cy - rect.top) * sy), canvas.height) };
    }

    function onPenUp() {
        if (!drawing) return;
        drawing = false;
        if (currentStroke.length) { pendingStrokes.push(currentStroke); currentStroke = []; }
        if (!pendingStrokes.length) return;
        if (pauseTimer) clearTimeout(pauseTimer);
        pauseTimer = setTimeout(flushPendingStrokes, PAUSE_MS);
        statusDiv.innerText = `✏️ 停笔 · ${pendingStrokes.length} 笔待变身 · 1s后自动生成`;
    }

    function onPenDown(e) {
        e.preventDefault();
        if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
        drawing = true;
        currentStroke = [getCoords(e)];
        statusDiv.innerText = pendingStrokes.length ? `✏️ 绘画中 · ${pendingStrokes.length} 笔待变身` : '✏️ 绘画中...';
    }

    canvas.addEventListener('mousedown', onPenDown);
    canvas.addEventListener('mousemove', e => { if (!drawing) return; e.preventDefault(); currentStroke.push(getCoords(e)); });
    canvas.addEventListener('mouseup', onPenUp);
    canvas.addEventListener('mouseleave', onPenUp);
    canvas.addEventListener('touchstart', onPenDown, { passive: false });
    canvas.addEventListener('touchmove', e => { if (!drawing) return; e.preventDefault(); currentStroke.push(getCoords(e)); }, { passive: false });
    canvas.addEventListener('touchend', onPenUp);
    canvas.addEventListener('touchcancel', onPenUp);

    resize();
    render();
})();
</script>
</body>
</html>
